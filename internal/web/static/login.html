<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Kiro Gateway - Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;display:flex;align-items:center;justify-content:center;height:100dvh;flex-direction:column;gap:16px;padding:20px}
h1{font-size:22px;color:#58a6ff}
input{padding:12px 16px;width:100%;max-width:320px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:16px}
button{padding:12px 24px;border-radius:8px;border:none;background:#58a6ff;color:#fff;font-size:15px;cursor:pointer;width:100%;max-width:320px}
button:active{opacity:.8}
.err{color:#f85149;font-size:13px;min-height:18px}
</style>
</head>
<body>
<h1>⚡ Kiro Gateway</h1>
<input id="k" type="password" placeholder="Admin API Key" autofocus>
<button onclick="login()">Login</button>
<div id="e" class="err"></div>
<script>
async function login(){
  const r=await fetch('api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:document.getElementById('k').value})});
  if(r.ok)window.location.reload();
  else document.getElementById('e').textContent='Invalid key';
}
document.getElementById('k').onkeydown=e=>{if(e.key==='Enter')login()};
</script>
</body>
</html>
